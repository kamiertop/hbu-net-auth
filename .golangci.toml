version = "2"

[run]
timeout = "3m"
tests = true

[linters]
default = "none"
enable = [
  "bodyclose",
  "errcheck",
  "gocritic",
  "govet",
  "ineffassign",
  "misspell",
  "staticcheck",
  "unconvert",
  "unused",
]

[formatters]
enable = [
  "gofmt",
  "goimports",
]

[issues]
max-issues-per-linter = 0
max-same-issues = 0

[[issues.exclude-rules]]
path = "_test\\.go"
linters = ["errcheck"]

[output]
sort-order = ["file", "linter"]
